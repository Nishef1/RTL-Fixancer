<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTL Fixancer</title>
    <style>
        :root {
            --bg-start: #faf3e0;
            --bg-end: #f5e6d3;
            --primary: #1e3a5f;
            --primary-light: #2c5282;
            --accent: #c17f59;
            --success: #4a9e6b;
            --success-light: #e6f4ed;
            --error: #c4554a;
            --error-light: #fde8e6;
            --text-primary: #2d3748;
            --text-secondary: #5a6577;
            --text-muted: #8e99ab;
            --card-bg: #ffffff;
            --border-color: #e8e0d8;
            --radius: 10px;
            --radius-sm: 7px;
            --radius-xs: 5px;
            --transition: 0.2s ease;
            --font-app: 'ShabnamPopup', Tahoma, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'ShabnamPopup';
            src: url('shabnam.woff2') format('woff2');
            font-display: swap;
        }

        body {
            font-family: var(--font-app);
            width: 340px;
            min-height: 460px;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.55;
        }

        .header {
            background: var(--card-bg);
            padding: 10px 12px 8px;
            text-align: center;
            border-radius: 0 0 14px 14px;
            margin-bottom: 8px;
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            position: relative;
        }

        .header h1 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .icon-links {
            position: absolute;
            top: 9px;
            left: 12px;
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
        }
        .icon-btn.github { background: #24292e; }
        .icon-btn.donate { background: linear-gradient(135deg, #ff7aa2 0%, #ff4d6d 100%); }
        .icon-btn svg { width: 16px; height: 16px; }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12.5px;
            padding: 4px 12px;
            border-radius: 18px;
            font-weight: 600;
        }
        .status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .status.connected { background: var(--success-light); color: #276749; }
        .status.connected::before { background: var(--success); }
        .status.disconnected { background: var(--error-light); color: #9b2c2c; }
        .status.disconnected::before { background: var(--error); }

        .main-content { padding: 0 10px 8px; }
        .section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 12px;
            margin-bottom: 7px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .section h3 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 14.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
        }

        .current-site {
            background: #f8f6f3;
            border-radius: var(--radius-sm);
            padding: 8px 10px;
            border: 1px solid #ede8e2;
        }
        .site-url {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            word-break: break-all;
            font-size: 14px;
        }
        .site-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
        }
        .site-toggle-container { display: flex; align-items: center; gap: 8px; }
        .site-toggle-label { font-size: 12.5px; color: var(--text-secondary); font-weight: 500; }

        .mini-switch { position: relative; width: 38px; height: 21px; display: inline-block; }
        .mini-switch input { opacity: 0; width: 0; height: 0; }
        .mini-slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: #d1cdc8;
            transition: .25s ease;
            border-radius: 21px;
        }
        .mini-slider:before {
            position: absolute; content: '';
            height: 15px; width: 15px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .25s ease;
            border-radius: 50%;
            box-shadow: 0 1px 3px rgba(0,0,0,.15);
        }
        input:checked + .mini-slider { background-color: var(--success); }
        input:checked + .mini-slider:before { transform: translateX(17px); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-xs);
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font-app);
        }
        .btn:hover { background: var(--primary-light); }
        .btn.secondary { background: #6b7a8a; }
        .btn.mini { padding: 4px 10px; font-size: 11.5px; }
        .btn.loading { pointer-events: none; opacity: .85; }

        .form-row { display: flex; gap: 6px; align-items: stretch; }
        .form-group { flex: 1; min-width: 0; }
        .form-group label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        .form-group select {
            width: 100%;
            padding: 6px 8px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-xs);
            font-size: 12.5px;
            background: #fff;
            color: var(--text-primary);
            font-family: var(--font-app);
        }

        .sites-count {
            background: var(--accent);
            color: white;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10.5px;
            margin-right: 5px;
            font-weight: 700;
        }
        .sites-container {
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-top: 6px;
        }
        .site-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 9px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }
        .delete-btn {
            background: var(--error-light);
            color: var(--error);
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn svg { width: 15px; height: 15px; display: block; }
        .delete-btn svg path { stroke: currentColor; }
        .empty-sites { text-align: center; padding: 14px; color: var(--text-muted); font-style: italic; font-size: 12px; }
        .help { font-size: 11px; color: var(--text-secondary); opacity: 0.85; text-align: center; }
        .message-container {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }
        .error-container { background: var(--error-light); color: #9b2c2c; border: 1px solid #f5c6cb; }
        .success-container { background: var(--success-light); color: #276749; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔄 RTL Fixancer</h1>
        <div class="icon-links" aria-label="Project links">
            <button id="btnDonate" class="icon-btn donate" title="حمایت" aria-label="حمایت">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.1 21.35l-1.1-1.02C5.14 14.94 2 12.12 2 8.5 2 6 4 4 6.5 4c1.54 0 3.04.99 3.57 2.36h.87C11.46 4.99 12.96 4 14.5 4 17 4 19 6 19 8.5c0 3.62-3.14 6.44-8.9 11.83l-1.1 1.02Z"/></svg>
            </button>
            <button id="btnGithub" class="icon-btn github" title="گیت‌هاب" aria-label="گیت‌هاب">
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 .2a8 8 0 0 0-2.53 15.6c.4.07.55-.17.55-.38v-1.33c-2.25.49-2.72-1.08-2.72-1.08-.36-.9-.88-1.14-.88-1.14-.72-.49.06-.48.06-.48.8.06 1.22.83 1.22.83.71 1.22 1.86.87 2.32.66.07-.52.28-.87.5-1.07-1.8-.2-3.69-.9-3.69-4a3.1 3.1 0 0 1 .82-2.15c-.08-.2-.36-1.02.08-2.12 0 0 .68-.22 2.22.82a7.6 7.6 0 0 1 4.04 0c1.54-1.04 2.22-.82 2.22-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.11-1.9 3.8-3.71 4 .29.25.54.74.54 1.5v2.22c0 .21.15.46.55.38A8 8 0 0 0 8 .2Z"/></svg>
            </button>
        </div>
        <div id="hearts" class="hearts-container" aria-hidden="true"></div>
        <div id="status" class="status disconnected">وضعیت: در حال اتصال...</div>
    </div>

    <div class="main-content">
        <div class="section">
            <h3 style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                <span>🌐 سایت فعلی</span>
                <button id="btnExportPdf" class="btn mini" aria-label="دانلود PDF صفحه">📥 PDF</button>
            </h3>
            <div class="current-site">
                <div class="site-url" id="currentSiteUrl">در حال بارگذاری...</div>
                <div class="site-controls" id="currentSiteControls" style="display: none;">
                    <div class="site-toggle-container">
                        <span class="site-toggle-label">فعال</span>
                        <label class="mini-switch" aria-label="فعال/غیرفعال سایت فعلی">
                            <input type="checkbox" id="currentSiteToggle">
                            <span class="mini-slider"></span>
                        </label>
                    </div>
                    <button id="btnReapply" class="btn secondary" aria-label="اعمال مجدد روی این صفحه">اعمال مجدد</button>
                </div>
            </div>
        </div>

        <div class="section" id="settingsPanel">
            <h3>🎨 تنظیمات</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="fontSelect">فونت</label>
                    <select id="fontSelect">
                        <option value="vazir">وزیر</option>
                        <option value="shabnam">شبنم</option>
                        <option value="default">پیشفرض</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fontSizeSelect">سایز</label>
                    <select id="fontSizeSelect">
                        <option value="default">پیشفرض</option>
                        <option value="small">کوچک</option>
                        <option value="medium">متوسط</option>
                        <option value="large">بزرگ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="detectionMode">حساسیت</label>
                    <select id="detectionMode">
                        <option value="high">بالا</option>
                        <option value="medium">متوسط</option>
                        <option value="low">پایین</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>
                📋 سایتها
                <span class="sites-count" id="sitesCount">0</span>
            </h3>
            <div class="sites-container" id="sitesList">
                <div class="empty-sites">هیچ سایتی اضافه نشده</div>
            </div>
        </div>

        <div class="help">با تغییر تنظیمات، نتایج بلافاصله اعمال می‌شود.</div>
    </div>

    <script src="popup.js"></script>
    <script src="popup-patch.js"></script>
</body>
</html>
