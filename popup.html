<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>RTL Fixancer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="app" aria-labelledby="app-title">
        <header class="hero">
            <div>
                <p class="eyebrow">RTL typography</p>
                <h1 id="app-title">RTL Fixancer</h1>
            </div>
            <div class="hero-actions">
                <button id="githubButton" class="icon-button" type="button" aria-label="Open GitHub repository" title="GitHub">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .7a11.3 11.3 0 0 0-3.57 22c.57.1.78-.24.78-.55v-2.18c-3.18.7-3.85-1.35-3.85-1.35-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.95.1-.74.4-1.25.73-1.54-2.54-.29-5.21-1.27-5.21-5.65 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.11 1.17a10.8 10.8 0 0 1 5.68 0c2.16-1.48 3.11-1.17 3.11-1.17.62 1.57.23 2.73.11 3.02a4.42 4.42 0 0 1 1.18 3.07c0 4.39-2.68 5.35-5.23 5.64.41.36.78 1.06.78 2.14v3.17c0 .31.21.66.79.55A11.3 11.3 0 0 0 12 .7Z"/></svg>
                </button>
            </div>
        </header>

        <div id="notice" class="notice" role="status" aria-live="polite" hidden></div>

        <section class="card site-card" aria-labelledby="site-heading">
            <div class="section-heading">
                <div>
                    <p class="section-label" id="site-heading">Current site</p>
                    <p id="currentSite" class="site-name">Loading…</p>
                </div>
                <label class="switch" aria-label="Enable RTL Fixancer on the current site">
                    <input id="siteToggle" type="checkbox" disabled>
                    <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
                </label>
            </div>
            <p id="siteHint" class="hint">Open an HTTP or HTTPS page to use the extension.</p>
            <div class="button-row">
                <button id="reapplyButton" class="button secondary" type="button" disabled>Re-apply</button>
                <button id="printButton" class="button secondary" type="button" disabled>Print / PDF</button>
            </div>
        </section>

        <section class="card" aria-labelledby="appearance-heading">
            <div class="section-heading compact">
                <h2 id="appearance-heading">Appearance</h2>
            </div>
            <div class="field-grid">
                <label class="field">
                    <span>Font</span>
                    <select id="fontSelect">
                        <option value="vazir">Vazir</option>
                        <option value="shabnam">Shabnam</option>
                        <option value="default">Website default</option>
                    </select>
                </label>
                <label class="field">
                    <span>Size</span>
                    <select id="fontSizeSelect">
                        <option value="default">Website default</option>
                        <option value="small">Small</option>
                        <option value="medium">Medium</option>
                        <option value="large">Large</option>
                    </select>
                </label>
            </div>
            <label class="field full-width">
                <span>Detection</span>
                <select id="detectionModeSelect">
                    <option value="strict">Strict</option>
                    <option value="balanced">Balanced</option>
                    <option value="relaxed">Relaxed</option>
                </select>
            </label>
        </section>

        <section class="card" aria-labelledby="sites-heading">
            <div class="section-heading compact">
                <h2 id="sites-heading">Enabled sites</h2>
                <span id="sitesCount" class="count">0</span>
            </div>
            <div id="sitesList" class="sites-list" aria-live="polite"></div>
        </section>

        <footer class="footer">
            <label class="language-control">
                <span class="sr-only">Popup language</span>
                <select id="languageSelect" aria-label="Popup language">
                    <option value="en">English</option>
                    <option value="fa">فارسی</option>
                </select>
            </label>
            <span>Runs only on sites you enable.</span>
        </footer>
    </main>

    <script src="lib/core.js"></script>
    <script src="popup.js"></script>
</body>
</html>
