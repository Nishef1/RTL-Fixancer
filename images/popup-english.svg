<svg width="340" height="458" viewBox="0 0 340 458" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RTL Fixancer English popup UI</title>
  <desc id="desc">English popup interface showing current site toggle, PDF action, font settings, sensitivity, and enabled sites.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="340" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF3E0"/>
      <stop offset="1" stop-color="#F5E6D3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="340" height="458" rx="0" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="78" rx="10" fill="#FFFFFF"/>
    <path d="M0 76H340" stroke="#C17F59" stroke-width="3"/>
    <text x="170" y="29" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="18" font-weight="700" fill="#1E3A5F">RTL Fixancer</text>
    <circle cx="278" cy="22" r="14" fill="#FF7AA2"/>
    <text x="278" y="27" text-anchor="middle" font-family="Segoe UI Emoji, Arial" font-size="14" fill="#FFFFFF">♥</text>
    <circle cx="312" cy="22" r="14" fill="#24292E"/>
    <text x="312" y="27" text-anchor="middle" font-family="Segoe UI Emoji, Arial" font-size="13" fill="#FFFFFF">●</text>
    <rect x="49" y="42" width="242" height="26" rx="13" fill="#FDE8E6"/>
    <circle cx="66" cy="55" r="4" fill="#C4554A"/>
    <text x="80" y="60" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="13" fill="#9B2C2C">Status: Disconnected - site disabled</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="10" y="88" width="320" height="126" rx="8" fill="#FFFFFF"/>
    <text x="24" y="117" font-family="Segoe UI Emoji, Arial" font-size="14">🌐</text>
    <text x="47" y="117" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">Current site</text>
    <rect x="256" y="98" width="61" height="26" rx="4" fill="#1E3A5F"/>
    <text x="286" y="116" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">📥 PDF</text>
    <rect x="23" y="130" width="294" height="74" rx="5" fill="#F8F6F3" stroke="#EDE8E2"/>
    <text x="33" y="158" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">github.com</text>
    <text x="33" y="186" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="13" fill="#5A6577">Active</text>
    <rect x="78" y="172" width="37" height="21" rx="10.5" fill="#D1CDC8"/>
    <circle cx="88" cy="182.5" r="7.5" fill="#FFFFFF"/>
    <rect x="231" y="167" width="74" height="28" rx="4" fill="#6B7A8A"/>
    <text x="268" y="185" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Re-apply</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="10" y="223" width="320" height="103" rx="8" fill="#FFFFFF"/>
    <text x="24" y="252" font-family="Segoe UI Emoji, Arial" font-size="14">🎨</text>
    <text x="47" y="252" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">Settings</text>
    <text x="23" y="274" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="11" fill="#1E3A5F">Font</text>
    <text x="123" y="274" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="11" fill="#1E3A5F">Size</text>
    <text x="223" y="274" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="11" fill="#1E3A5F">Sensitivity</text>
    <rect x="23" y="284" width="93" height="31" rx="4" fill="#FFFFFF" stroke="#E8E0D8"/>
    <rect x="123" y="284" width="93" height="31" rx="4" fill="#FFFFFF" stroke="#E8E0D8"/>
    <rect x="223" y="284" width="93" height="31" rx="4" fill="#FFFFFF" stroke="#E8E0D8"/>
    <text x="37" y="304" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="13" fill="#111827">Vazir</text>
    <text x="137" y="304" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="13" fill="#111827">Default</text>
    <text x="237" y="304" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="13" fill="#111827">Medium</text>
    <path d="M103 297L108 302L113 297" stroke="#111827" stroke-width="1.5"/>
    <path d="M203 297L208 302L213 297" stroke="#111827" stroke-width="1.5"/>
    <path d="M303 297L308 302L313 297" stroke="#111827" stroke-width="1.5"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="10" y="335" width="320" height="92" rx="8" fill="#FFFFFF"/>
    <text x="24" y="363" font-family="Segoe UI Emoji, Arial" font-size="14">📋</text>
    <text x="47" y="363" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">Sites</text>
    <circle cx="101" cy="356" r="10" fill="#C17F59"/>
    <text x="101" y="360" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">1</text>
    <rect x="23" y="376" width="294" height="39" rx="5" fill="#FFFFFF" stroke="#E8E0D8"/>
    <text x="33" y="400" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="12" fill="#374151">chatgpt.com</text>
    <rect x="279" y="383" width="26" height="25" rx="6" fill="#FDE8E6"/>
    <text x="292" y="401" text-anchor="middle" font-family="Segoe UI Emoji, Arial" font-size="13" fill="#C4554A">🗑</text>
  </g>

  <text x="170" y="448" text-anchor="middle" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="11" fill="#5A6577">Changes are applied immediately.</text>
</svg>
